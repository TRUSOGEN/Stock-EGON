name: US Stock Portfolio Report

on:
  workflow_dispatch:
    inputs:
      report_type:
        description: "daily or weekly"
        required: true
        default: "daily"
      dedupe:
        description: "skip when today's successful report marker exists"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 0 * * 2-6"
    - cron: "37 0 * * 2-6"
    - cron: "57 0 * * 2-6"
    - cron: "17 1 * * 6"
    - cron: "37 1 * * 6"
    - cron: "57 1 * * 6"

concurrency:
  group: us-stock-portfolio-report
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  report:
    if: ${{ vars.REPORT_ENABLED != 'false' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Scheduled duplicate guard
        id: schedule_guard
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
          WORKFLOW_REPORT_TYPE: ${{ github.event.inputs.report_type || 'daily' }}
          WORKFLOW_DEDUPE_MANUAL: ${{ github.event.inputs.dedupe || 'false' }}
        run: python scripts/schedule_guard.py
      - name: Install dependencies
        if: steps.schedule_guard.outputs.skip != 'true'
        run: pip install -r requirements.txt
      - name: Daily report
        if: steps.schedule_guard.outputs.skip != 'true' && steps.schedule_guard.outputs.report_type == 'daily'
        env:
          PORTFOLIO_JSON: ${{ secrets.PORTFOLIO_JSON || vars.PORTFOLIO_JSON }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          SERPAPI_API_KEYS: ${{ secrets.SERPAPI_API_KEYS }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          BRAVE_API_KEYS: ${{ secrets.BRAVE_API_KEYS }}
          NEWS_PROVIDER_ORDER: ${{ secrets.NEWS_PROVIDER_ORDER || vars.NEWS_PROVIDER_ORDER }}
          NEWS_MAX_ITEMS_PER_SYMBOL: ${{ secrets.NEWS_MAX_ITEMS_PER_SYMBOL || vars.NEWS_MAX_ITEMS_PER_SYMBOL }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER || vars.LLM_PROVIDER }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL || vars.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL || vars.LLM_MODEL }}
          LLM_TIMEOUT_SECONDS: ${{ secrets.LLM_TIMEOUT_SECONDS || vars.LLM_TIMEOUT_SECONDS }}
          LLM_MAX_TOKENS: ${{ secrets.LLM_MAX_TOKENS || vars.LLM_MAX_TOKENS }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL || vars.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || vars.OPENAI_MODEL }}
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          ARK_BASE_URL: ${{ secrets.ARK_BASE_URL || vars.ARK_BASE_URL }}
          ARK_MODEL: ${{ secrets.ARK_MODEL || vars.ARK_MODEL }}
          VOLCENGINE_ARK_API_KEY: ${{ secrets.VOLCENGINE_ARK_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL || vars.DEEPSEEK_MODEL }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_AUTH_CODE: ${{ secrets.EMAIL_AUTH_CODE }}
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT || vars.EMAIL_SMTP_PORT }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_USE_TLS: ${{ secrets.EMAIL_USE_TLS || vars.EMAIL_USE_TLS }}
          EMAIL_INCLUDE_CHARTS: ${{ secrets.EMAIL_INCLUDE_CHARTS || vars.EMAIL_INCLUDE_CHARTS }}
        run: |
          mkdir -p reports
          python scripts/preflight.py
          python scripts/us_daily_report.py > reports/us-daily-report.json
          cat reports/us-daily-report.json
          python scripts/send_email_report.py --report-file reports/us-daily-report.json
      - name: Weekly review
        if: steps.schedule_guard.outputs.skip != 'true' && steps.schedule_guard.outputs.report_type == 'weekly'
        env:
          PORTFOLIO_JSON: ${{ secrets.PORTFOLIO_JSON || vars.PORTFOLIO_JSON }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          SERPAPI_API_KEYS: ${{ secrets.SERPAPI_API_KEYS }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          BRAVE_API_KEYS: ${{ secrets.BRAVE_API_KEYS }}
          NEWS_PROVIDER_ORDER: ${{ secrets.NEWS_PROVIDER_ORDER || vars.NEWS_PROVIDER_ORDER }}
          NEWS_MAX_ITEMS_PER_SYMBOL: ${{ secrets.NEWS_MAX_ITEMS_PER_SYMBOL || vars.NEWS_MAX_ITEMS_PER_SYMBOL }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER || vars.LLM_PROVIDER }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL || vars.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL || vars.LLM_MODEL }}
          LLM_TIMEOUT_SECONDS: ${{ secrets.LLM_TIMEOUT_SECONDS || vars.LLM_TIMEOUT_SECONDS }}
          LLM_MAX_TOKENS: ${{ secrets.LLM_MAX_TOKENS || vars.LLM_MAX_TOKENS }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL || vars.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || vars.OPENAI_MODEL }}
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          ARK_BASE_URL: ${{ secrets.ARK_BASE_URL || vars.ARK_BASE_URL }}
          ARK_MODEL: ${{ secrets.ARK_MODEL || vars.ARK_MODEL }}
          VOLCENGINE_ARK_API_KEY: ${{ secrets.VOLCENGINE_ARK_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL || vars.DEEPSEEK_MODEL }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_AUTH_CODE: ${{ secrets.EMAIL_AUTH_CODE }}
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT || vars.EMAIL_SMTP_PORT }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_USE_TLS: ${{ secrets.EMAIL_USE_TLS || vars.EMAIL_USE_TLS }}
          EMAIL_INCLUDE_CHARTS: ${{ secrets.EMAIL_INCLUDE_CHARTS || vars.EMAIL_INCLUDE_CHARTS }}
        run: |
          mkdir -p reports
          python scripts/preflight.py
          python scripts/us_weekly_review.py > reports/us-weekly-review.json
          cat reports/us-weekly-review.json
          python scripts/send_email_report.py --report-file reports/us-weekly-review.json
      - name: Write report marker
        if: success() && steps.schedule_guard.outputs.skip != 'true' && steps.schedule_guard.outputs.marker != ''
        run: |
          mkdir -p reports/markers
          printf '%s\n' "${{ steps.schedule_guard.outputs.reason }}" > "reports/markers/${{ steps.schedule_guard.outputs.marker }}.txt"
      - name: Upload report marker
        if: success() && steps.schedule_guard.outputs.skip != 'true' && steps.schedule_guard.outputs.marker != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.schedule_guard.outputs.marker }}
          path: reports/markers/${{ steps.schedule_guard.outputs.marker }}.txt
          retention-days: 14
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: us-stock-report
          path: reports/*.json
          if-no-files-found: ignore
