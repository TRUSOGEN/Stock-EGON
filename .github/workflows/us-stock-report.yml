name: US Stock Portfolio Report

on:
  workflow_dispatch:
    inputs:
      report_type:
        description: "daily or weekly"
        required: true
        default: "daily"
  schedule:
    - cron: "30 0 * * 2-6"
    - cron: "0 1 * * 6"

concurrency:
  group: us-stock-portfolio-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Daily report
        if: (github.event_name == 'schedule' && github.event.schedule == '30 0 * * 2-6') || (github.event_name == 'workflow_dispatch' && github.event.inputs.report_type == 'daily')
        env:
          PORTFOLIO_JSON: ${{ secrets.PORTFOLIO_JSON || vars.PORTFOLIO_JSON }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL || vars.WECHAT_WEBHOOK_URL }}
        run: |
          mkdir -p reports
          python scripts/us_daily_report.py > reports/us-daily-report.json
          cat reports/us-daily-report.json
          python scripts/send_wechat_report.py --report-file reports/us-daily-report.json
      - name: Weekly review
        if: (github.event_name == 'schedule' && github.event.schedule == '0 1 * * 6') || (github.event_name == 'workflow_dispatch' && github.event.inputs.report_type == 'weekly')
        env:
          PORTFOLIO_JSON: ${{ secrets.PORTFOLIO_JSON || vars.PORTFOLIO_JSON }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL || vars.WECHAT_WEBHOOK_URL }}
        run: |
          mkdir -p reports
          python scripts/us_weekly_review.py > reports/us-weekly-review.json
          cat reports/us-weekly-review.json
          python scripts/send_wechat_report.py --report-file reports/us-weekly-review.json
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: us-stock-report
          path: reports/*.json
          if-no-files-found: ignore
