name: US Stock Portfolio Report

on:
  workflow_dispatch:
    inputs:
      report_type:
        description: "daily or weekly"
        required: true
        default: "daily"
  schedule:
    - cron: "30 0 * * 2-6"
    - cron: "0 1 * * 6"

concurrency:
  group: us-stock-portfolio-report
  cancel-in-progress: false

jobs:
  report:
    if: ${{ vars.REPORT_ENABLED != 'false' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Daily report
        if: (github.event_name == 'schedule' && github.event.schedule == '30 0 * * 2-6') || (github.event_name == 'workflow_dispatch' && github.event.inputs.report_type == 'daily')
        env:
          PORTFOLIO_JSON: ${{ secrets.PORTFOLIO_JSON || vars.PORTFOLIO_JSON }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          SERPAPI_API_KEYS: ${{ secrets.SERPAPI_API_KEYS }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          BRAVE_API_KEYS: ${{ secrets.BRAVE_API_KEYS }}
          NEWS_PROVIDER_ORDER: ${{ secrets.NEWS_PROVIDER_ORDER || vars.NEWS_PROVIDER_ORDER }}
          NEWS_MAX_ITEMS_PER_SYMBOL: ${{ secrets.NEWS_MAX_ITEMS_PER_SYMBOL || vars.NEWS_MAX_ITEMS_PER_SYMBOL }}
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT || vars.EMAIL_SMTP_PORT }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_USE_TLS: ${{ secrets.EMAIL_USE_TLS || vars.EMAIL_USE_TLS }}
        run: |
          mkdir -p reports
          python scripts/us_daily_report.py > reports/us-daily-report.json
          cat reports/us-daily-report.json
          python scripts/send_email_report.py --report-file reports/us-daily-report.json
      - name: Weekly review
        if: (github.event_name == 'schedule' && github.event.schedule == '0 1 * * 6') || (github.event_name == 'workflow_dispatch' && github.event.inputs.report_type == 'weekly')
        env:
          PORTFOLIO_JSON: ${{ secrets.PORTFOLIO_JSON || vars.PORTFOLIO_JSON }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          SERPAPI_API_KEYS: ${{ secrets.SERPAPI_API_KEYS }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          BRAVE_API_KEYS: ${{ secrets.BRAVE_API_KEYS }}
          NEWS_PROVIDER_ORDER: ${{ secrets.NEWS_PROVIDER_ORDER || vars.NEWS_PROVIDER_ORDER }}
          NEWS_MAX_ITEMS_PER_SYMBOL: ${{ secrets.NEWS_MAX_ITEMS_PER_SYMBOL || vars.NEWS_MAX_ITEMS_PER_SYMBOL }}
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT || vars.EMAIL_SMTP_PORT }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_USE_TLS: ${{ secrets.EMAIL_USE_TLS || vars.EMAIL_USE_TLS }}
        run: |
          mkdir -p reports
          python scripts/us_weekly_review.py > reports/us-weekly-review.json
          cat reports/us-weekly-review.json
          python scripts/send_email_report.py --report-file reports/us-weekly-review.json
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: us-stock-report
          path: reports/*.json
          if-no-files-found: ignore
