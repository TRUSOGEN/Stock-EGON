<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stock-EGON 交互图</title>
    <style>
      :root {
        --paper: #f5f7f2;
        --ink: #111827;
        --muted: #667085;
        --rule: #d6ddd8;
        --panel: #ffffff;
        --blue: #1f67b2;
        --amber: #b7791f;
        --green: #28724f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        overflow-x: hidden;
      }

      main {
        width: min(1240px, calc(100% - 32px));
        margin: 0 auto;
        padding: 18px 0 26px;
      }

      header {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: end;
        padding-bottom: 14px;
        border-bottom: 1px solid var(--rule);
      }

      h1 {
        margin: 0;
        font-size: clamp(26px, 4vw, 44px);
        line-height: 1;
        letter-spacing: 0;
      }

      .subtle {
        margin-top: 10px;
        color: var(--muted);
        font-size: 14px;
      }

      .controls {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      label {
        color: var(--muted);
        font-size: 13px;
      }

      input,
      button {
        height: 40px;
        border-radius: 8px;
        border: 1px solid var(--rule);
        font: inherit;
      }

      input {
        width: 136px;
        padding: 0 12px;
        background: var(--panel);
        color: var(--ink);
        text-transform: uppercase;
      }

      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 14px;
        color: #ffffff;
        background: var(--ink);
        border-color: var(--ink);
        cursor: pointer;
      }

      button:focus-visible,
      input:focus-visible,
      a:focus-visible {
        outline: 3px solid rgba(183, 121, 31, 0.36);
        outline-offset: 2px;
      }

      .workspace {
        margin-top: 14px;
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .chart-panel,
      .symbol-strip {
        background: var(--panel);
        border: 1px solid var(--rule);
        border-radius: 8px;
      }

      .chart-panel {
        height: clamp(620px, calc(100vh - 178px), 820px);
        overflow: hidden;
      }

      #tradingviewContainer {
        width: 100%;
        height: 100%;
      }

      #tradingviewContainer iframe {
        display: block;
        width: 100%;
        height: 100%;
      }

      .symbol-strip {
        display: grid;
        grid-template-columns: auto minmax(220px, 1fr) auto;
        gap: 16px;
        align-items: center;
        padding: 12px 14px;
      }

      .symbol {
        font-size: 30px;
        line-height: 1;
        font-weight: 760;
      }

      .label {
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .note {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
        overflow-wrap: anywhere;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
      }

      .links a {
        min-height: 34px;
        display: inline-flex;
        align-items: center;
        border: 1px solid var(--rule);
        border-radius: 999px;
        padding: 0 12px;
        text-decoration: none;
        color: var(--blue);
        font-size: 13px;
        font-weight: 650;
      }

      .links a:hover {
        border-color: rgba(31, 103, 178, 0.5);
        background: #f3f8ff;
      }

      .signal {
        display: inline-flex;
        align-items: center;
        max-width: 100%;
        min-height: 28px;
        padding: 5px 10px;
        border-radius: 999px;
        background: #edf7f1;
        color: var(--green);
        font-size: 13px;
        font-weight: 650;
        line-height: 1.35;
        overflow-wrap: anywhere;
      }

      .range-controls {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 6px;
      }

      .range-controls button {
        min-width: 42px;
        height: 32px;
        padding: 0 10px;
        border-radius: 999px;
        border: 1px solid var(--rule);
        color: var(--ink);
        background: #ffffff;
        font-size: 13px;
        font-weight: 700;
      }

      .range-controls button.is-active {
        color: #ffffff;
        border-color: var(--ink);
        background: var(--ink);
      }

      .loading-state {
        height: 100%;
        display: grid;
        place-items: center;
        padding: 24px;
        color: var(--muted);
        font-size: 14px;
        text-align: center;
      }

      footer {
        margin-top: 14px;
        color: var(--muted);
        font-size: 12px;
      }

      @media (max-width: 820px) {
        main {
          width: min(100% - 16px, 1240px);
          padding-top: 10px;
        }

        header {
          grid-template-columns: 1fr;
          gap: 12px;
        }

        .controls {
          width: 100%;
          display: grid;
          grid-template-columns: auto minmax(0, 1fr);
          gap: 8px;
        }

        input {
          width: 100%;
          min-width: 0;
        }

        #loadButton {
          grid-column: 1 / -1;
          width: 100%;
        }

        .symbol-strip {
          grid-template-columns: 1fr;
          gap: 10px;
          padding: 12px;
        }

        .symbol-strip > * {
          min-width: 0;
        }

        .symbol-strip .note {
          display: none;
        }

        .links {
          justify-content: flex-start;
        }

        .range-controls {
          justify-content: flex-start;
        }

        .chart-panel {
          height: clamp(420px, calc(100vh - 320px), 620px);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Stock-EGON 交互图</h1>
          <div class="subtle">输入或使用邮件链接里的 ticker，打开公开行情交互图。</div>
        </div>
        <div class="controls">
          <label for="symbolInput">Ticker</label>
          <input id="symbolInput" autocomplete="off" inputmode="latin" />
          <button type="button" id="loadButton">打开</button>
        </div>
      </header>

      <section class="workspace">
        <div class="symbol-strip">
          <div>
            <div class="label">Ticker</div>
            <div class="symbol" id="activeSymbol">--</div>
          </div>
          <div>
            <div class="note">只加载 URL 里的单个公开 ticker，不读取持仓数量、成本价、邮箱或 API key。</div>
            <div class="signal">静态邮件图用于快速阅读，这里用于拖拽、缩放和切换周期。</div>
          </div>
          <nav class="links" aria-label="外部行情链接">
            <a id="yahooLink" target="_blank" rel="noopener noreferrer">Yahoo</a>
            <a id="tradingViewLink" target="_blank" rel="noopener noreferrer">TradingView</a>
            <a id="nasdaqLink" target="_blank" rel="noopener noreferrer">Nasdaq</a>
          </nav>
          <div class="range-controls" aria-label="图表周期">
            <button type="button" class="is-active" data-interval="D">日</button>
            <button type="button" data-interval="W">周</button>
            <button type="button" data-interval="M">月</button>
          </div>
        </div>
        <div class="chart-panel">
          <div id="tradingviewContainer"></div>
        </div>
      </section>

      <footer>本页只拼接公开行情页面，不保存持仓数量、成本价、邮箱或 API key。</footer>
    </main>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
      const symbolInput = document.getElementById("symbolInput");
      const loadButton = document.getElementById("loadButton");
      const activeSymbol = document.getElementById("activeSymbol");
      const yahooLink = document.getElementById("yahooLink");
      const tradingViewLink = document.getElementById("tradingViewLink");
      const nasdaqLink = document.getElementById("nasdaqLink");
      const containerId = "tradingviewContainer";
      const rangeButtons = Array.from(document.querySelectorAll("[data-interval]"));
      const rangeByInterval = {
        D: "6M",
        W: "1Y",
        M: "5Y",
      };
      let activeInterval = "D";

      function normalizeSymbol(value) {
        return String(value || "")
          .trim()
          .toUpperCase()
          .replace(/[^A-Z0-9.-]/g, "");
      }

      function querySymbol() {
        return normalizeSymbol(new URLSearchParams(window.location.search).get("symbol"));
      }

      function activeTicker() {
        return normalizeSymbol(symbolInput.value) || "NVDA";
      }

      function syncUrl(symbol) {
        const url = new URL(window.location.href);
        url.searchParams.set("symbol", symbol);
        window.history.replaceState({}, "", url);
      }

      function setLinks(symbol) {
        activeSymbol.textContent = symbol;
        yahooLink.href = `https://finance.yahoo.com/quote/${encodeURIComponent(symbol)}/chart/`;
        tradingViewLink.href = `https://www.tradingview.com/chart/?symbol=${encodeURIComponent(symbol)}`;
        nasdaqLink.href = `https://www.nasdaq.com/market-activity/stocks/${encodeURIComponent(symbol.toLowerCase())}`;
      }

      function syncRangeButtons() {
        for (const button of rangeButtons) {
          button.classList.toggle("is-active", button.dataset.interval === activeInterval);
        }
      }

      function renderWidget(symbol) {
        const container = document.getElementById(containerId);
        container.innerHTML = `<div class="loading-state">正在加载 ${symbol} 公开行情图...</div>`;
        setLinks(symbol);
        syncUrl(symbol);
        syncRangeButtons();
        if (!window.TradingView) {
          container.innerHTML =
            '<div class="loading-state">TradingView 脚本没有加载成功，请使用上方 Yahoo、TradingView 或 Nasdaq 链接。</div>';
          return;
        }
        container.innerHTML = "";
        new window.TradingView.widget({
          autosize: true,
          symbol,
          interval: activeInterval,
          range: rangeByInterval[activeInterval] || "6M",
          timezone: "America/New_York",
          theme: "light",
          style: "3",
          locale: "zh_CN",
          toolbar_bg: "#ffffff",
          enable_publishing: false,
          hide_side_toolbar: true,
          hide_top_toolbar: window.matchMedia("(max-width: 700px)").matches,
          allow_symbol_change: true,
          container_id: containerId,
        });
      }

      function loadCurrent() {
        const symbol = activeTicker();
        symbolInput.value = symbol;
        renderWidget(symbol);
      }

      loadButton.addEventListener("click", loadCurrent);
      symbolInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") loadCurrent();
      });
      for (const button of rangeButtons) {
        button.addEventListener("click", () => {
          activeInterval = button.dataset.interval || "D";
          loadCurrent();
        });
      }

      symbolInput.value = querySymbol() || "NVDA";
      loadCurrent();
    </script>
  </body>
</html>
